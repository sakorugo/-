<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vercel DNS設定ガイド</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;padding-bottom:48px}
.header{background:linear-gradient(160deg,#0d1433 0%,#1a0d33 100%);padding:48px 24px 32px;border-bottom:1px solid #ffffff11}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
.badge{font-size:11px;padding:4px 10px;border:1px solid #4f7cff55;border-radius:20px;color:#4f7cff}
h1{font-size:26px;font-weight:800;line-height:1.3;margin:0 0 10px;color:#fff}
.subtitle{font-size:14px;color:#888;line-height:1.6;margin:0 0 24px}
.subtitle em{color:#f5c842;font-style:normal}
.progress-wrap{display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:6px;background:#ffffff15;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.progress-text{font-size:13px;color:#aaa;white-space:nowrap}
.list{padding:24px 16px;display:flex;flex-direction:column;gap:12px}
.card{border-radius:16px;border:1px solid;overflow:hidden;transition:border-color 0.3s}
.card-header{width:100%;background:transparent;border:none;color:inherit;padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;text-align:left}
.step-left{display:flex;align-items:center;gap:14px}
.step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;transition:background 0.3s}
.category-tag{font-size:11px;color:#888;display:flex;align-items:center;gap:5px;margin-bottom:3px;letter-spacing:1px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.step-title{font-size:15px;font-weight:700;color:#f0f0f8;line-height:1.3}
.chevron{font-size:20px;color:#555;transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.card-body{padding:0 16px 18px;border-top:1px solid #ffffff08}
.detail{font-size:13px;color:#888;margin:14px 0 10px;line-height:1.6}
.check-label{font-size:12px;color:#666;margin-bottom:10px}
.item-list{display:flex;flex-direction:column;gap:8px}
.item{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid;cursor:pointer;background:transparent;color:inherit;text-align:left;transition:background 0.2s,border-color 0.2s}
.checkbox{width:20px;height:20px;border-radius:6px;border:2px solid #555;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;font-size:12px;font-weight:800;color:#000}
.item-label{font-size:13px;color:#ccc;flex:1;font-family:monospace}
.item-tag{font-size:11px;padding:3px 8px;border:1px solid;border-radius:6px;font-family:monospace;white-space:nowrap;flex-shrink:0}
.note{margin-top:14px;padding:10px 14px;background:#ffffff06;border-radius:10px;font-size:12px;color:#aaa;line-height:1.6;border-left:3px solid #f5c84233}
.footer{padding:0 16px;text-align:center;font-size:14px;color:#666}
.success-box{background:linear-gradient(135deg,#0d1f0d,#1a2a1a);border:1px solid #3ddc8444;border-radius:16px;padding:20px 24px;font-size:16px;font-weight:600;color:#3ddc84;line-height:2}
</style>
</head>
<body>
<div class="header">
<div class="header-top"><span class="logo">▲ Vercel</span><span class="badge">DNS設定ガイド</span></div>
<h1>www ドメイン<br>警告を解消する</h1>
<p class="subtitle">www.tesousakorugo.com の<br><em>DNS Change Recommended</em> を完全解決</p>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<span class="progress-text" id="progressText">0% 完了</span>
</div>
</div>
<div class="list" id="stepList"></div>
<div class="footer" id="footer">残り <strong id="remaining" style="color:#f5c842">0</strong> 項目</div>
<script>
const steps=[{id:1,category:"現状確認",color:"#4f7cff",title:"Vercel Domains 画面を開く",detail:"Vercel プロジェクト → Settings → Domains を開く",checkLabel:"以下の3ドメインが表示されているか確認",items:[{label:"tesousakorugo.com",tag:"✅ Valid Configuration"},{label:"www.tesousakorugo.com",tag:"⚠️ DNS Change Recommended"},{label:"shin-to-hamon.vercel.app",tag:"✅ Valid Configuration"}],note:null},{id:2,category:"DNS確認",color:"#3ddc84",title:"www の CNAME を確認（お名前.com）",detail:"お名前.com → DNS設定 → レコード一覧を開く",checkLabel:"www のレコードを確認",items:[{label:"ホスト名",tag:"www"},{label:"タイプ",tag:"CNAME"},{label:"値（正しい設定）",tag:"cname.vercel-dns.com"}],note:"⚠️ www に A レコードや別の CNAME が重複している場合は削除する"},{id:3,category:"DNS確認",color:"#3ddc84",title:"apex ドメインの A レコードを確認",detail:"tesousakorugo.com（www なし）のレコードを確認",checkLabel:"以下のどちらかになっているか確認",items:[{label:"タイプ: A",tag:"76.76.21.21"},{label:"または CNAME",tag:"cname.vercel-dns.com"}],note:"apex は CNAME より A レコード推奨"},{id:4,category:"待機",color:"#f5c842",title:"DNS 反映を待つ",detail:"設定変更後は反映に時間がかかります",checkLabel:"目安の待機時間",items:[{label:"最短",tag:"30分"},{label:"通常",tag:"1〜3時間"},{label:"最大",tag:"24〜48時間"}],note:"この間は Vercel 画面の警告が残ることがある（正常）"},{id:5,category:"最終確認",color:"#c084f5",title:"Vercel Domains 画面で再確認",detail:"待機後、Vercel の Domains 画面をリロード",checkLabel:"目標の状態",items:[{label:"tesousakorugo.com",tag:"✅ Valid"},{label:"www.tesousakorugo.com",tag:"✅ Valid"},{label:"307 リダイレクト",tag:"apex → www"}],note:"まだ警告が残る場合はステップ2に戻る"}];
const checked={};const expanded={1:true};
function totalItems(){return steps.reduce((a,s)=>a+s.items.length,0)}
function doneCount(){return Object.values(checked).filter(Boolean).length}
function stepDone(s){return s.items.every((_,i)=>checked[s.id+'-'+i])}
function updateProgress(){const pct=Math.round(doneCount()/totalItems()*100);const fill=document.getElementById('progressFill');fill.style.width=pct+'%';fill.style.background=pct===100?'linear-gradient(90deg,#3ddc84,#4f7cff)':'linear-gradient(90deg,#4f7cff,#c084f5)';document.getElementById('progressText').textContent=pct+'% 完了';const rem=totalItems()-doneCount();const footer=document.getElementById('footer');if(pct===100){footer.innerHTML='<div class="success-box">🎉 すべてのステップ完了！<br><small style="font-size:13px;color:#aaa">Vercel Domains 画面で Valid Configuration を確認してください</small></div>'}else{footer.innerHTML='残り <strong style="color:#f5c842">'+rem+'</strong> 項目'}}
function render(){const list=document.getElementById('stepList');list.innerHTML='';steps.forEach(step=>{const done=stepDone(step);const open=expanded[step.id];const color=step.color;const bg=done?'#1a2a1a':step.category==='待機'?'#2a2a14':step.category==='最終確認'?'#2a1a2a':'#1a2744';const card=document.createElement('div');card.className='card';card.style.background=bg;card.style.borderColor=done?'#3ddc84':color+'44';const header=document.createElement('button');header.className='card-header';header.innerHTML='<div class="step-left"><div class="step-num" style="background:'+(done?'#3ddc84':color)+';color:'+(done?'#000':'#fff')+'">'+(done?'✓':step.id)+'</div><div><div class="category-tag"><span class="dot" style="background:'+(done?'#3ddc84':color)+'"></span>'+step.category+'</div><div class="step-title">'+step.title+'</div></div></div><span class="chevron '+(open?'open':'')+'">▾</span>';header.onclick=()=>{expanded[step.id]=!expanded[step.id];render()};card.appendChild(header);if(open){const body=document.createElement('div');body.className='card-body';body.innerHTML='<p class="detail">'+step.detail+'</p><p class="check-label">'+step.checkLabel+'</p>';const itemList=document.createElement('div');itemList.className='item-list';step.items.forEach((item,i)=>{const key=step.id+'-'+i;const isChecked=!!checked[key];const btn=document.createElement('button');btn.className='item';btn.style.background=isChecked?'#0d1f0d':'#ffffff0a';btn.style.borderColor=isChecked?'#3ddc84':color+'33';btn.innerHTML='<div class="checkbox" style="background:'+(isChecked?'#3ddc84':'transparent')+';border-color:'+(isChecked?'#3ddc84':'#555')+'">'+(isChecked?'✓':'')+'</div><span class="item-label">'+item.label+'</span><span class="item-tag" style="color:'+(isChecked?'#3ddc84':color)+';border-color:'+(isChecked?'#3ddc8444':color+'44')+'">'+item.tag+'</span>';btn.onclick=()=>{checked[key]=!checked[key];render();updateProgress()};itemList.appendChild(btn)});body.appendChild(itemList);if(step.note){const note=document.createElement('div');note.className='note';note.innerHTML='<span style="color:#f5c842">💡</span> '+step.note;body.appendChild(note)}card.appendChild(body)}list.appendChild(card)});updateProgress()}
render();
</script>
</body>
</html>
